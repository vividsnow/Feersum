# HAProxy TCP mode for SSL termination only
# Usage: haproxy -f /path/to/haproxy-stream.cfg
#
# This is Layer 4 (TCP) proxying - no HTTP inspection, just SSL termination.
# More efficient than HTTP mode when you only need SSL termination.
#
# Backend: plackup -s Feersum -p 5000 --keepalive app.psgi

global
    log stdout format raw local0
    maxconn 4096

    # SSL tuning
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2
    tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    tcp          # TCP mode, not HTTP
    option  tcplog
    option  dontlognull

    # Timeouts
    timeout connect 5s
    timeout client  60s
    timeout server  60s

    retries 3

#=============================================================================
# Frontend: SSL termination
#=============================================================================
frontend ssl_front
    bind *:443 ssl crt /etc/ssl/certs/server.pem alpn h2,http/1.1

    # TCP keepalive
    option clitcpka

    default_backend feersum_tcp

#=============================================================================
# Frontend: Plain TCP (for testing)
#=============================================================================
frontend tcp_front
    bind *:8080

    option clitcpka

    default_backend feersum_tcp

#=============================================================================
# Backend: TCP to Feersum
#=============================================================================
backend feersum_tcp
    mode tcp
    balance roundrobin

    # TCP keepalive to backend
    option srvtcpka

    # Health check (TCP connect)
    option tcp-check
    default-server check inter 5s fall 3 rise 2

    server feersum1 127.0.0.1:5000 check
    # server feersum2 127.0.0.1:5001 check

#=============================================================================
# Backend: Unix socket
#=============================================================================
backend feersum_unix
    mode tcp
    balance roundrobin
    option srvtcpka

    server feersum_local /tmp/feersum.sock check

#=============================================================================
# Stats (optional)
#=============================================================================
frontend stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
