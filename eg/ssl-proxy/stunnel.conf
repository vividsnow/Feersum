; Minimal stunnel config for SSL termination with PROXY Protocol v1
;
; Usage:
;   stunnel eg/ssl-proxy/stunnel.conf
;
; Test:
;   curl -k https://localhost:8443/
;
; PROXY Protocol v1 (text format) sends:
;   - Real client IP address and port
;   - Destination address and port
;   (no SSL/TLS info - that is a PROXY v2 TLV, which stunnel cannot send)
;
; Feersum will:
;   - Set REMOTE_ADDR/REMOTE_PORT to the real client address
;   - psgi.url_scheme stays "http" (dst port here is 8443). Feersum infers
;     "https" from a PROXY destination port of 443 (any version), from a
;     PROXY v2 PP2_TYPE_SSL TLV (e.g. haproxy send-proxy-v2-ssl), or from
;     X-Forwarded-Proto in reverse_proxy mode

foreground = yes
pid =

[https]
accept = 8443
connect = /tmp/feersum.sock
cert = eg/ssl-proxy/server.crt
key = eg/ssl-proxy/server.key

; Enable PROXY protocol (v1) to backend
; Sends client and destination address/port
protocol = proxy
